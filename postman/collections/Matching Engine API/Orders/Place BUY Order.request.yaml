$kind: http-request
name: Place BUY Order
method: POST
url: '{{baseUrl}}/api/orders'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "userId": "user-001",
      "symbol": "BTC_USDT",
      "side": "BUY",
      "price": 65000.0000,
      "quantity": 0.5000
    }
examples: './.resources/Place BUY Order.resources/examples'
