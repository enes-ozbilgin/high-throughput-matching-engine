$kind: http-example
name: 200 OK - BUY Order Created
request:
  url: '{{baseUrl}}/api/orders'
  method: POST
response:
  statusCode: 200
  statusText: OK
  headers:
    - key: Content-Type
      value: application/json
  body:
    type: json
    content: |-
      {
        "id": 1,
        "userId": "user-001",
        "symbol": "BTC_USDT",
        "side": "BUY",
        "price": 65000.0000,
        "quantity": 0.5000,
        "status": "PENDING",
        "createdAt": "2026-03-10T09:00:00Z"
      }
