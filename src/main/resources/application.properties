spring.application.name=core-engine

# ===============================
# 1. SUNUCU AYARLARI
# ===============================
server.port=8080

# ===============================
# 2. POSTGRESQL VER\u0130TABANI AYARLARI
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5437/matching_db
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Ba\u011Flant\u0131 Havuzu (Y³ksek verim/Throughput iþin)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5

# JPA & Hibernate Ayarlar\u0131
spring.jpa.hibernate.ddl-auto=update
# Not: Y³k testleri (load testing) yaparken show-sql ayar\u0131n\u0131 "false" yapmay\u0131 unutmay\u0131n,
# konsola s³rekli yaz\u0131 yazd\u0131rmak performans\u0131 ciddi \u015Fekilde d³\u015F³r³r!
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 3. RED\u0130S AYARLARI (Docker ³zerinden)
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Olas\u0131 tak\u0131lmalar\u0131 ÷nlemek iþin 2 saniyelik timeout:
spring.data.redis.timeout=2000

# ===============================
# 4. WEBSOCKET AYARLARI
# ===============================
# \u015Eu an iþin varsay\u0131lan ayarlarda kalabilir.